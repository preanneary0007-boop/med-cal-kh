<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a1628">
<meta name="description" content="Medical Clinical Score Calculator — Bilingual KH/EN">
<title>MedScore Global</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a1628;
  --bg2: #0f1e35;
  --bg3: #162542;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #e8edf5;
  --text2: #8a9ab5;
  --text3: #506080;
  --accent: #3b82f6;
  --accent2: #60a5fa;
  --green: #10b981;
  --yellow: #f59e0b;
  --red: #ef4444;
  --orange: #f97316;
  --purple: #8b5cf6;
  --teal: #14b8a6;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --radius: 12px;
  --radius-lg: 18px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── LAYOUT ── */
.app { display: flex; flex-direction: column; min-height: 100vh; max-width: 480px; margin: 0 auto; }
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,22,40,0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 14px 18px;
  display: flex; align-items: center; gap: 10px;
}
.topbar-logo { font-size: 15px; font-weight: 600; color: var(--text); flex: 1; }
.topbar-logo span { color: var(--accent2); }
.lang-btn {
  background: var(--bg3); border: 1px solid var(--border2);
  color: var(--text2); font-family: var(--font); font-size: 12px;
  padding: 5px 11px; border-radius: 20px; cursor: pointer;
  transition: all .2s;
}
.lang-btn:hover { color: var(--text); border-color: var(--accent); }
.lang-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── SEARCH ── */
.search-wrap { padding: 14px 18px 8px; }
.search-box {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 11px 15px;
  transition: border-color .2s;
}
.search-box:focus-within { border-color: var(--accent); }
.search-icon { color: var(--text3); font-size: 16px; flex-shrink: 0; }
.search-input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-family: var(--font); font-size: 14px;
}
.search-input::placeholder { color: var(--text3); }

/* ── CATEGORIES ── */
.cats { display: flex; gap: 7px; padding: 6px 18px 12px; overflow-x: auto; scrollbar-width: none; }
.cats::-webkit-scrollbar { display: none; }
.cat-pill {
  flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 500; cursor: pointer;
  border: 1px solid var(--border2); color: var(--text2);
  background: var(--bg2); transition: all .2s; white-space: nowrap;
}
.cat-pill.active, .cat-pill:hover { color: #fff; border-color: transparent; }
.cat-pill[data-cat="all"].active { background: var(--accent); }
.cat-pill[data-cat="cardio"].active { background: #dc2626; }
.cat-pill[data-cat="neuro"].active { background: var(--purple); }
.cat-pill[data-cat="sepsis"].active { background: var(--orange); }
.cat-pill[data-cat="pulm"].active { background: var(--teal); }
.cat-pill[data-cat="gi"].active { background: #84cc16; }
.cat-pill[data-cat="renal"].active { background: #06b6d4; }
.cat-pill[data-cat="surgery"].active { background: #ec4899; }
.cat-pill[data-cat="psych"].active { background: var(--yellow); }
.cat-pill[data-cat="lab"].active { background: #6366f1; }
.cat-pill[data-cat="obgyn"].active { background: #f43f5e; }

/* ── SCORE LIST ── */
.score-list { flex: 1; padding: 0 18px 100px; display: flex; flex-direction: column; gap: 8px; }
.score-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 16px;
  cursor: pointer; transition: all .22s;
  display: flex; align-items: center; gap: 14px;
}
.score-card:hover { border-color: var(--border2); background: var(--bg3); transform: translateY(-1px); }
.score-icon {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.score-body { flex: 1; min-width: 0; }
.score-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.score-use { font-size: 12px; color: var(--text2); line-height: 1.4; }
.score-arrow { color: var(--text3); font-size: 18px; flex-shrink: 0; }
.no-results { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 14px; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px); z-index: 200;
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 24px 24px 0 0; width: 100%; max-width: 480px;
  max-height: 90vh; overflow-y: auto;
  transform: translateY(60px); transition: transform .3s ease;
  padding-bottom: 30px;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-header {
  position: sticky; top: 0; background: var(--bg2);
  padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.modal-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.modal-title { flex: 1; }
.modal-title h2 { font-size: 16px; font-weight: 600; }
.modal-title p { font-size: 12px; color: var(--text2); margin-top: 2px; }
.modal-close {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

.modal-body { padding: 20px; }
.info-box {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px; margin-bottom: 20px;
}
.info-box h4 { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
.info-box p { font-size: 13px; color: var(--text2); line-height: 1.6; }

.field-group { margin-bottom: 18px; }
.field-label { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 8px; display: block; }
.field-label small { font-weight: 400; color: var(--text3); font-size: 11px; margin-left: 4px; }

.radio-group { display: flex; flex-direction: column; gap: 7px; }
.radio-option {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 10px; padding: 11px 14px; cursor: pointer;
  transition: all .18s;
}
.radio-option:hover { border-color: var(--border2); }
.radio-option.selected { border-color: var(--accent); background: rgba(59,130,246,0.1); }
.radio-option input { display: none; }
.radio-dot {
  width: 16px; height: 16px; border-radius: 50%;
  border: 2px solid var(--border2); flex-shrink: 0;
  transition: all .18s;
}
.radio-option.selected .radio-dot { border-color: var(--accent); background: var(--accent); }
.radio-text { flex: 1; }
.radio-text .main { font-size: 13px; color: var(--text); }
.radio-text .sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
.radio-pts { font-family: var(--mono); font-size: 12px; color: var(--text3); }
.radio-option.selected .radio-pts { color: var(--accent2); }

.number-input-wrap { display: flex; align-items: center; gap: 8px; }
.number-input {
  flex: 1; background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 10px; padding: 11px 14px;
  color: var(--text); font-family: var(--font); font-size: 14px;
  outline: none; transition: border-color .2s;
}
.number-input:focus { border-color: var(--accent); }
.number-unit { font-size: 12px; color: var(--text3); }

.calc-btn {
  width: 100%; padding: 15px;
  background: var(--accent); color: #fff;
  border: none; border-radius: var(--radius); font-family: var(--font);
  font-size: 15px; font-weight: 600; cursor: pointer;
  transition: all .2s; margin-top: 4px;
}
.calc-btn:hover { background: #2563eb; transform: translateY(-1px); }
.calc-btn:active { transform: translateY(0); }

/* ── RESULT ── */
.result-box {
  border-radius: var(--radius-lg); padding: 22px;
  text-align: center; margin-top: 20px;
  border: 1px solid transparent; display: none;
}
.result-box.show { display: block; }
.result-score { font-family: var(--mono); font-size: 48px; font-weight: 500; margin-bottom: 6px; }
.result-label { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
.result-interp { font-size: 13px; line-height: 1.6; opacity: .85; }
.result-action { font-size: 12px; margin-top: 12px; opacity: .7; font-style: italic; }

.result-low { background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.3); }
.result-low .result-score, .result-low .result-label { color: var(--green); }
.result-mod { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.3); }
.result-mod .result-score, .result-mod .result-label { color: var(--yellow); }
.result-high { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); }
.result-high .result-score, .result-high .result-label { color: var(--red); }
.result-info { background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.3); }
.result-info .result-score, .result-info .result-label { color: var(--accent2); }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px;
  background: rgba(10,22,40,0.95); backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  display: flex; padding: 10px 0 16px;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 4px; cursor: pointer; color: var(--text3); transition: color .2s;
  font-size: 10px; font-weight: 500;
}
.nav-item.active { color: var(--accent2); }
.nav-icon { font-size: 22px; }

/* ── CATEGORY COLOR DOTS ── */
.cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="topbar-logo">Med<span>Score</span> <span style="color:var(--text3);font-weight:400;font-size:12px">Global</span></div>
    <button class="lang-btn active" id="btnKH" onclick="setLang('kh')">ខ្មែរ</button>
    <button class="lang-btn" id="btnEN" onclick="setLang('en')">EN</button>
  </div>

  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" placeholder="ស្វែងរក Score... / Search score..." oninput="filterScores()">
    </div>
  </div>

  <div class="cats" id="catBar"></div>
  <div class="score-list" id="scoreList"></div>

  <div class="bottom-nav">
    <div class="nav-item active"><div class="nav-icon">🧮</div><span id="nav1">គណនា</span></div>
    <div class="nav-item"><div class="nav-icon">📋</div><span id="nav2">ប្រវត្តិ</span></div>
    <div class="nav-item"><div class="nav-icon">📚</div><span id="nav3">ព័ត៌មាន</span></div>
    <div class="nav-item"><div class="nav-icon">⚙️</div><span id="nav4">ការកំណត់</span></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-icon" id="mIcon"></div>
      <div class="modal-title">
        <h2 id="mTitle"></h2>
        <p id="mSubtitle"></p>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="mBody"></div>
  </div>
</div>

<script>
// ── LANGUAGE ──
let lang = 'kh';
function setLang(l) {
  lang = l;
  document.getElementById('btnKH').classList.toggle('active', l==='kh');
  document.getElementById('btnEN').classList.toggle('active', l==='en');
  document.getElementById('nav1').textContent = l==='kh' ? 'គណនា' : 'Calculate';
  document.getElementById('nav2').textContent = l==='kh' ? 'ប្រវត្តិ' : 'History';
  document.getElementById('nav3').textContent = l==='kh' ? 'ព័ត៌មាន' : 'Info';
  document.getElementById('nav4').textContent = l==='kh' ? 'ការកំណត់' : 'Settings';
  document.getElementById('searchInput').placeholder = l==='kh' ? 'ស្វែងរក Score...' : 'Search score...';
  renderList();
}

// ── DATA ──
const categories = [
  { id:'all',     icon:'🔬', kh:'ទាំងអស់',    en:'All' },
  { id:'cardio',  icon:'❤️',  kh:'បេះដូង',     en:'Cardio' },
  { id:'neuro',   icon:'🧠', kh:'សរសៃប្រសាទ', en:'Neuro' },
  { id:'sepsis',  icon:'🔥', kh:'Sepsis/ICU', en:'Sepsis/ICU' },
  { id:'pulm',    icon:'🫁', kh:'សួត',         en:'Pulm' },
  { id:'gi',      icon:'🏥', kh:'រលាក GI',    en:'GI' },
  { id:'renal',   icon:'💧', kh:'តម្រងនោម',   en:'Renal' },
  { id:'surgery', icon:'🔪', kh:'វះកាត់',      en:'Surgery' },
  { id:'psych',   icon:'🧩', kh:'សុខភាពចិត្ត', en:'Psych' },
  { id:'lab',     icon:'🔢', kh:'Lab/Calc',   en:'Lab/Calc' },
  { id:'obgyn',   icon:'🤰', kh:'OB/GYN',     en:'OB/GYN' },
];
const catColors = {
  cardio:'#dc2626',neuro:'#8b5cf6',sepsis:'#f97316',
  pulm:'#14b8a6',gi:'#84cc16',renal:'#06b6d4',
  surgery:'#ec4899',psych:'#f59e0b',lab:'#6366f1',obgyn:'#f43f5e'
};

const scores = [
  // CARDIOLOGY
  {
    id:'heart', cat:'cardio', icon:'❤️',
    name:'HEART Score',
    kh_use:'វាស់ risk ACS ក្នុង chest pain',
    en_use:'Risk stratification for ACS in chest pain',
    kh_desc:'ប្រើក្នុង Emergency Department ដើម្បីវាស់ថា chest pain មកពី ACS ឬអត់',
    en_desc:'Used in Emergency Department to assess risk of major adverse cardiac events (MACE) in chest pain patients.',
    fields:[
      {id:'h',label_kh:'ប្រវត្តិ (History)',label_en:'History',
       opts:[{v:0,kh:'Low suspicion',en:'Low suspicion'},{v:1,kh:'Moderate suspicion',en:'Moderate suspicion'},{v:2,kh:'High suspicion',en:'High suspicion'}]},
      {id:'e',label_kh:'ECG',label_en:'ECG',
       opts:[{v:0,kh:'Normal',en:'Normal'},{v:1,kh:'Non-specific repolarization',en:'Non-specific repolarization'},{v:2,kh:'Significant ST deviation',en:'Significant ST deviation'}]},
      {id:'a',label_kh:'អាយុ (Age)',label_en:'Age',
       opts:[{v:0,kh:'< 45 ឆ្នាំ',en:'< 45 years'},{v:1,kh:'45–64 ឆ្នាំ',en:'45–64 years'},{v:2,kh:'≥ 65 ឆ្នាំ',en:'≥ 65 years'}]},
      {id:'r',label_kh:'Risk Factors',label_en:'Risk Factors',
       opts:[{v:0,kh:'គ្មាន',en:'No known risk factors'},{v:1,kh:'1–2 risk factors',en:'1–2 risk factors'},{v:2,kh:'≥ 3 risk factors / History of atherosclerosis',en:'≥ 3 factors or atherosclerosis'}]},
      {id:'t',label_kh:'Troponin',label_en:'Troponin',
       opts:[{v:0,kh:'≤ ULN',en:'≤ Normal limit'},{v:1,kh:'1–2× ULN',en:'1–2× upper normal'},{v:2,kh:'> 2× ULN',en:'> 2× upper normal'}]},
    ],
    interpret(s){
      if(s<=3) return {cls:'low',kh_lbl:'Low Risk',en_lbl:'Low Risk',kh_i:'MACE risk < 2% — អាចផ្ញើ귀 ត្រឡប់ ជាមួយ follow-up',en_i:'MACE risk < 2% — safe for early discharge with follow-up'};
      if(s<=6) return {cls:'mod',kh_lbl:'Moderate Risk',en_lbl:'Moderate Risk',kh_i:'MACE risk 12–65% — ត្រូវ observe ១២-២៤ ម៉ោង',en_i:'MACE risk 12–65% — observe 12–24h, serial troponins'};
      return {cls:'high',kh_lbl:'High Risk',en_lbl:'High Risk',kh_i:'MACE risk > 65% — ត្រូវ admit ភ្លាម ជាមួយ cardiology',en_i:'MACE risk > 65% — admit immediately, cardiology consult'};
    }
  },
  {
    id:'chads', cat:'cardio', icon:'❤️',
    name:'CHA₂DS₂-VASc',
    kh_use:'Stroke risk ក្នុង Atrial Fibrillation',
    en_use:'Stroke risk in atrial fibrillation',
    kh_desc:'គណនា annual stroke risk ក្នុង non-valvular AF ដើម្បីសម្រេចចិត្ត anticoagulation',
    en_desc:'Calculates annual stroke risk in non-valvular AF to guide anticoagulation therapy.',
    fields:[
      {id:'c',label_kh:'Heart Failure',label_en:'Congestive Heart Failure',opts:[{v:0,kh:'គ្មាន',en:'No'},{v:1,kh:'មាន',en:'Yes'}]},
      {id:'h',label_kh:'Hypertension',label_en:'Hypertension',opts:[{v:0,kh:'គ្មាន',en:'No'},{v:1,kh:'មាន',en:'Yes'}]},
      {id:'a2',label_kh:'អាយុ ≥ 75',label_en:'Age ≥ 75',opts:[{v:0,kh:'គ្មាន',en:'No'},{v:2,kh:'មាន (+2)',en:'Yes (+2)'}]},
      {id:'d',label_kh:'Diabetes',label_en:'Diabetes Mellitus',opts:[{v:0,kh:'គ្មាន',en:'No'},{v:1,kh:'មាន',en:'Yes'}]},
      {id:'s2',label_kh:'Stroke/TIA ពីមុន',label_en:'Prior Stroke/TIA',opts:[{v:0,kh:'គ្មាន',en:'No'},{v:2,kh:'មាន (+2)',en:'Yes (+2)'}]},
      {id:'v',label_kh:'Vascular Disease',label_en:'Vascular Disease',opts:[{v:0,kh:'គ្មាន',en:'No'},{v:1,kh:'មាន',en:'Yes'}]},
      {id:'a',label_kh:'អាយុ 65–74',label_en:'Age 65–74',opts:[{v:0,kh:'គ្មាន',en:'No'},{v:1,kh:'មាន',en:'Yes'}]},
      {id:'sc',label_kh:'ភេទស្ត្រី (Female)',label_en:'Female Sex',opts:[{v:0,kh:'ប្រុស',en:'Male'},{v:1,kh:'ស្ត្រី',en:'Female'}]},
    ],
    interpret(s){
      if(s===0) return {cls:'low',kh_lbl:'Risk ទាប',en_lbl:'Low Risk',kh_i:'Annual stroke risk ~0% — Anticoagulation មិនចំាបាច់',en_i:'Annual stroke risk ~0% — Anticoagulation not recommended'};
      if(s===1) return {cls:'mod',kh_lbl:'Risk មធ្យម',en_lbl:'Moderate Risk',kh_i:'Annual stroke risk ~1.3% — ពិចារណា anticoagulation',en_i:'Annual stroke risk ~1.3% — Consider anticoagulation'};
      return {cls:'high',kh_lbl:'Risk ខ្ពស់',en_lbl:'High Risk',kh_i:`Annual stroke risk ~${[0,0,2.2,3.2,4.0,6.7,9.8,9.6,12.5][Math.min(s,8)]||'>9'}% — ត្រូវ anticoagulation`,en_i:`Annual stroke risk ~${[0,0,2.2,3.2,4.0,6.7,9.8,9.6,12.5][Math.min(s,8)]||'>9'}% — Anticoagulation recommended`};
    }
  },
  {
    id:'hasbled', cat:'cardio', icon:'❤️',
    name:'HAS-BLED Score',
    kh_use:'Bleeding risk ពេល anticoagulation',
    en_use:'Bleeding risk during anticoagulation',
    kh_desc:'វាស់ risk ហូរឈាម ក្នុង 1 ឆ្នាំ សម្រាប់ AF patients ដែលទទួល anticoagulation',
    en_desc:'Estimates 1-year major bleeding risk in AF patients on anticoagulation.',
    fields:[
      {id:'h',label_kh:'Hypertension (SBP>160)',label_en:'Hypertension (SBP>160)',opts:[{v:0,kh:'គ្មាន',en:'No'},{v:1,kh:'មាន',en:'Yes'}]},

      let hr=parseInt(document.querySelector('[data-fid="hr"]')?.value||0);

      let cr=parseFloat(document.querySelector('[data-fid="cr"]')?.value||0);
      let pts=0;
      if(age<30)pts+=0;else if(age<40)pts+=8;else if(age<50)pts+=25;else if(age<60)pts+=41;else if(age<70)pts+=58;else if(age<80)pts+=75;else pts+=91;

// ── STATE ──
let activeCat='all';
let currentScore=null;
let selections={};

// ── RENDER CATEGORIES ──
function renderCats(){
  const bar=document.getElementById('catBar');
  bar.innerHTML=categories.map(c=>`
    <div class="cat-pill ${activeCat===c.id?'active':''}" data-cat="${c.id}" onclick="setCat('${c.id}')">
      ${c.icon} ${lang==='kh'?c.kh:c.en}
    </div>
  `).join('');
}

function setCat(id){
  activeCat=id;
  renderCats();
  renderList();
}

// ── RENDER LIST ──
function renderList(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const list=document.getElementById('scoreList');
  const filtered=scores.filter(s=>{
    const catOk=activeCat==='all'||s.cat===activeCat;
    const searchOk=!q||s.name.toLowerCase().includes(q)||(lang==='kh'?s.kh_use:s.en_use).toLowerCase().includes(q)||s.cat.includes(q);
    return catOk&&searchOk;
  });
  if(!filtered.length){
    list.innerHTML=`<div class="no-results">${lang==='kh'?'មិនមាន Score ត្រូវគ្នា':'No matching scores found'}</div>`;
    return;
  }
  list.innerHTML=filtered.map(s=>`
    <div class="score-card" onclick="openScore('${s.id}')">
      <div class="score-icon" style="background:${catColors[s.cat]}22">${s.icon}</div>
      <div class="score-body">
        <div class="score-name">${s.name}</div>
        <div class="score-use">${lang==='kh'?s.kh_use:s.en_use}</div>
      </div>
      <div class="score-arrow">›</div>
    </div>
  `).join('');
}

function filterScores(){renderList();}

// ── OPEN SCORE MODAL ──
function openScore(id){
  currentScore=scores.find(s=>s.id===id);
  if(!currentScore) return;
  selections={};
  const s=currentScore;
  const col=catColors[s.cat];

  document.getElementById('mIcon').style.background=col+'22';
  document.getElementById('mIcon').textContent=s.icon;
  document.getElementById('mTitle').textContent=s.name;
  document.getElementById('mSubtitle').textContent=lang==='kh'?s.kh_use:s.en_use;

  let html=`
    <div class="info-box">
      <h4>${lang==='kh'?'ប្រើសម្រាប់':'Clinical Use'}</h4>
      <p>${lang==='kh'?s.kh_desc:s.en_desc}</p>
    </div>
  `;

  s.fields.forEach(f=>{
    html+=`<div class="field-group"><label class="field-label">${lang==='kh'?f.label_kh:f.label_en}</label>`;
    if(f.type==='number'){
      html+=`<div class="number-input-wrap">
        <input class="number-input" type="number" data-fid="${f.id}" min="${f.min||0}" max="${f.max||999}" placeholder="0" step="${f.id==='cr'||f.id==='qt'?'0.1':'1'}">
        <span class="number-unit">${f.unit||''}</span>
      </div>`;
    } else if(f.type==='date'){
      html+=`<div class="number-input-wrap">
        <input class="number-input" type="date" data-fid="${f.id}" style="color-scheme:dark">
      </div>`;
    } else {
      html+=`<div class="radio-group">`;
      f.opts.forEach(o=>{
        html+=`<div class="radio-option" data-field="${f.id}" data-val="${o.v}" onclick="selectOpt(this,'${f.id}',${o.v})">
          <div class="radio-dot"></div>
          <div class="radio-text">
            <div class="main">${lang==='kh'?o.kh:o.en}</div>
          </div>
          <div class="radio-pts">${o.v>0?'+'+o.v:o.v}</div>
        </div>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
  });

  html+=`<button class="calc-btn" onclick="calculate()">${lang==='kh'?'គណនា Score':'Calculate Score'}</button>`;
  html+=`<div class="result-box" id="resultBox"></div>`;

  document.getElementById('mBody').innerHTML=html;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function selectOpt(el,field,val){
  document.querySelectorAll(`[data-field="${field}"]`).forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
  selections[field]=val;
}

function calculate(){
  const s=currentScore;
  let total=0;
  let allFilled=true;

  s.fields.forEach(f=>{
    if(f.type==='number'||f.type==='date'){
      // handled in interpret
    } else {
      if(selections[f.id]!==undefined) total+=Number(selections[f.id]);
      else allFilled=false;
    }
  });

  const res=s.interpret(total);
  const box=document.getElementById('resultBox');
  box.className=`result-box show result-${res.cls}`;
  box.innerHTML=`
    <div class="result-score">${total}</div>
    <div class="result-label">${lang==='kh'?res.kh_lbl:res.en_lbl}</div>
    <div class="result-interp">${lang==='kh'?res.kh_i:res.en_i}</div>
    <div class="result-action">${lang==='kh'?'⚠️ ប្រើជំនួយសម្រេចចិត្ត — មិនជំនួស clinical judgment':'⚠️ Clinical decision support only — does not replace clinical judgment'}</div>
  `;
  box.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow='';
}
function closeModalOutside(e){
  if(e.target===document.getElementById('modalOverlay')) closeModal();
}

// ── INIT ──
renderCats();
renderList();
  // Service Worker
  if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
</script>
